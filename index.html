<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter Tournament</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>


<body class="page">
    <header class="glaceon">

        <img src="Headerimg.png" alt="Pokémon Winder Tournament">

    </header>

    <main>

        <h1>Register your <em>Cool</em> team!</h1>

        <label for="name">Name:</label>
        <br>
        <input 
            id="name" 
            type="text" 
            required 
            class="inputbox" 
            placeholder="Ex: James...">
            <br>

        <label for="email">Email:</label><br>
        <input 
            id="email" 
            type="email" 
            required 
            class="inputbox" 
            placeholder="Ex: meowth@rteam.com...">
            <br>

        <label for="phone">Phone:</label><br>
        <input 
            id="phone" 
            type="text" 
            required 
            class="inputbox" 
            placeholder="Ex: (00) 00000-0000">
            <br>

        <label for="age">Age:</label><br>
        <input 
            id="age"
            type="text" 
            class="inputbox" 
            placeholder="You must be 10 years+">
            <br>

        <label for="favorite">Your favorite Pokémon:</label><br>
        <input 
            id="favorite"
            type="text" 
            class="inputbox" 
            placeholder="Not Ditto, please">
            <br>

        <section class="checkbox" id="checkbox">

            <input 
                type="checkbox" 
                id="agree"
                required>

            <p class="normaltext">I aggree with the 
            <a class="ruleslink" href="rules-page/tournament-rules.html">Tournament rules.</a></p>
            
        </section>    
        <br>

        <button id="button" class="button" disabled>
            <strong>Register</strong>
        </button>

    </main>

</body>

</main>
<script src="script.js"></script>

<footer>
    <h5>
        © The PokéFans Events <br>
        Gotta catch 'em all!
    </h5>
    
</footer>

</html>
