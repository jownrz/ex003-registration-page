<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter Tournament</title>
    <link rel="stylesheet" href="style.css">
</head>


<body class="page">
    <header class="glaceon">

        <img src="Headerimg.png" alt="Pokémon Winder Tournament">

    </header>

    <main>

        <h1>Register your <em>Cool</em> team!</h1>

        <h4>Name:</h4>
        <input type="text" class="inputbox" placeholder="Ex: James...">

        <h4>Email:</h4>
        <input type="text" class="inputbox" placeholder="Ex: meowth@rteam.com...">

        <h4>Phone:</h4>
        <input type="text" class="inputbox" placeholder="Ex: (00) 00000-0000">

        <h4>Age:</h4>
        <input type="text" class="inputbox" placeholder="You must be 10 years+">

        <h4>Your favorite Pokémon:</h4>
        <input type="text" class="inputbox" placeholder="Not Ditto, please">
        <br>

        <section class="checkbox" id="checkbox">

            <input 
                type="checkbox" 
                id="agree"
                required>

            <p class="normaltext">I aggree with the 
            <a class="ruleslink" href="Tournament rules.html">Tournament rules.</a></p>
            
        </section>    

        <br>

        <button id="button" class="button" disabled>
            <strong>Register</strong>
        </button>

    </main>

</body>

</main>
<script src="script.js"></script>

<footer>
    <h5>
        © The PokéFans Events <br>
        Gotta catch 'em all!
    </h5>
    
</footer>

</html>
